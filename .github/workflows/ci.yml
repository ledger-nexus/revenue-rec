# CI for revenue-rec.
#
# tsc + unit tests on every PR / push to main. Tests here are pure-
# function (allocator, schedule generator, AI extractor with mocked
# SDK, ledger-bridge with mocked fetch) — no DB required.
#
# Production deployment is via Vercel's GitHub integration. See
# ledger-core/docs/DEPLOY.md.

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Unit tests
        run: npx vitest run
